<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title>MEKOU Brain Interface</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #080808; color: #00ff41; padding: 20px; }
        #chat-log { border: 1px solid #00ff41; height: 500px; overflow-y: auto; padding: 15px; background: #000; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .status { font-size: 0.8em; margin-bottom: 5px; color: #555; }
        .ai-content { display: inline; color: #00ff41; }
        button { background: #003300; color: #00ff41; border: 1px solid #00ff41; padding: 10px 20px; cursor: pointer; }
        button:active { background: #00ff41; color: #000; }
    </style>
</head>
<body>
    <h1>MEKOU TERMINAL [ULTRA LOW LATENCY]</h1>
    <div class="status" id="status">READY</div>
    <div id="chat-log"></div>
    <br>
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input type="text" id="text-input" placeholder="Enter message..." style="flex-grow: 1; background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px;">
        <button onclick="sendText()">SEND</button>
    </div>
    
    <button onmousedown="startRec()" onmouseup="stopRec()" onmouseleave="stopRec()">🎤 PUSH TO TALK</button>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        const chatLog = document.getElementById('chat-log');
        const textInput = document.getElementById('text-input');

        // Enterキーで送信
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendText();
        });

        async function sendText() {
            const text = textInput.value.trim();
            if (!text) return;
            
            textInput.value = "";
            const userDiv = document.createElement('div');
            userDiv.innerHTML = `<b style="color: #555;">USER:</b> ${text}`;
            chatLog.appendChild(userDiv);
            
            // サーバーへ送信（JSON形式）
            processResponse(fetch('http://localhost:3000/api/voice-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            }));
        }

        // 音声録音停止時の処理を関数化して共通利用
        async function stopRec() {
            if (!mediaRecorder || mediaRecorder.state !== "recording") return;
            mediaRecorder.stop();
            document.getElementById('status').innerText = "THINKING...";
            
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/wav' });
                const fd = new FormData();
                fd.append('file', blob);
                processResponse(fetch('http://localhost:3000/api/voice-chat', { method: 'POST', body: fd }));
            };
        }

        // ストリーミングレスポンスの処理
        async function processResponse(fetchPromise) {
            try {
                const response = await fetchPromise;
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                let aiDiv = document.createElement('div');
                aiDiv.innerHTML = `<b>MIKO:</b> <span class="ai-content"></span>`;
                chatLog.appendChild(aiDiv);
                let contentSpan = aiDiv.querySelector('.ai-content');
                
                let fullText = "";
                let speakIndex = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(l => l.trim());
                    
                    for (const line of lines) {
                        try {
                            const json = JSON.parse(line);
                            if (json.message && json.message.content) {
                                const char = json.message.content;
                                fullText += char;
                                contentSpan.innerText = fullText;
                                chatLog.scrollTop = chatLog.scrollHeight;

                                if (char.match(/[。！？\n]/)) {
                                    const chunkToSpeak = fullText.substring(speakIndex);
                                    speak(chunkToSpeak);
                                    speakIndex = fullText.length;
                                }
                            }
                        } catch(e) { console.error("JSON parse error", e); }
                    }
                }
            } finally {
                document.getElementById('status').innerText = "READY";
            }
        }

        async function startRec() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.start();
            document.getElementById('status').innerText = "RECORDING...";
        }

        function speak(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            uttr.rate = 1.2;
            speechSynthesis.speak(uttr);
        }
    </script>
</body>
</html>
